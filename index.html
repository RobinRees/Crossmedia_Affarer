<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <title>GPS Spel</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
  <div id="header" class="backgroundUi">
    <img id="logotyp" src="Images/GrumligaAffarerLogotyp.png" alt="">
  </div>

  <div id="map"></div>

  <div id="footer" class="backgroundUi">
    <div id="dialogBox">
      <div id="paperdollImage">
        <img src="Images/Paperdoll/PaperdollDoris.png" alt="">
      </div>
      <div id="textBox">
        <h1 id="name">Doris</h1>
        <p id="dialog">Doris ser nervös ut, som att hon bär på en hemlighet.<br><br>“Jag såg något vid vattnet den morgonen... något som inte borde varit där.”
        </p>
        <div id="buttons">
        <button class="ignore">Ignorera</button>
        <button class="talk">Prata</button>
        </div>
      </div>

    </div>


  </div>
