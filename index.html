<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <title>GPS Spel</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baskervville:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
  </style>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baskervville:ital,wght@0,400..700;1,400..700&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
  </style>
</head>

<body>
  <div id="header" class="backgroundUi">
    <img id="logotyp" src="Images/GrumligaAffarerLogotyp.png" alt="">
  </div>

  <div id="map"></div>

  <div id="footer" class="backgroundUi">
    <div id="dialogBox">
      <div id="paperdollImage">
        <img src="Images/Paperdoll/dorisNew.png" alt="">
      </div>
      <div id="textBox">
        <h1 id="name">Doris</h1>
        <p id="dialog"></p>
        <div id="buttons">
          <button class="ignore">Ignorera</button>
          <button class="talk" id="talk_doris">Prata</button>
        </div>
      </div>

    </div>

    <div id="conversationOverlay" class="hidden">
    <div class="conversation-content">
    
    <div class="dialog-profile">
      <img id="conv-img" src="Images/Paperdoll/ingrid.png">
      <h1 id="conv-title">Ingrid</h1>
    </div>

    <div class="dialog">
      <p id="dialog-name">Leopold</p>
      <p id="dialog-text"></p>
    </div>

    <div class="conv-buttons">
      <button id="continue-button">Fortsätt</button>
      <button id="exit-button">Gå vidare</button>
    </div>

  </div>
</div>


  </div>


  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
